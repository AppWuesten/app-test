<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>ZeitManager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZeitManager – einfache Zeiterfassung und Urlaubsplanung für iOS">

  <link rel="icon" href="favicon.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background-color: #f5f5f7;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    img.icon {
      width: 120px;
      border-radius: 22px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      line-height: 1.5;
    }

    .buttons a {
      display: inline-block;
      margin: 20px 0;
      text-decoration: none;
    }

    .screenshots img {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
    }

    .qr {
      margin-top: 30px;
    }

    footer {
      margin-top: 50px;
      font-size: 0.9em;
    }

    footer a {
      color: #555;
      text-decoration: none;
      margin: 0 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- App Icon -->
    <img src="AppIcon-iOS-Default-1024x1024@2x.png" alt="App Icon" class="icon">

    <h1>ZeitManager</h1>
    
    <p>iOS App die als Stempeluhr für den Arbeitsalltag dient und gleichzeitig auch</p>
    <p>einen Überblick über das ganze Kalenderjahr liefert. Inklusive einer</p>
    <p>Urlaubsplanung und der Anzeige von Schulferien.</p>

    <!-- App Store Button -->
    <div class="buttons">
      <a href="#" target="_blank"> <!-- Später # ersetzen durch: https://apps.apple.com/app/idXXXXXXXX -->
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" 
           alt="Download im App Store" height="50">
      </a>
    </div>

    <!-- Screenshots -->
    <div class="screenshots">
      <img src="Simulator Screenshot - iPhone 17 Pro - 2026-04-06 at 19.06.47.png" alt="Screenshot 1">
      <img src="Simulator Screenshot - iPhone 17 Pro - 2026-04-06 at 19.07.23.png" alt="Screenshot 2">
    </div>

    <!-- QR Code -->
    <div class="qr">
      <p>QR-Code scannen:</p>
      <img src="qr-code.png" alt="QR Code zur App" width="150">
    </div>

    <footer>
      <a href="impressum.html">Impressum</a> |
      <a href="datenschutz.html">Datenschutz</a>
    </footer>
  </div>
</body>
</html>
