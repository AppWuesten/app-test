<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background-color: #f5f5f7;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      font-size: 2em;
    }

    p {
      font-size: 1.1em;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 8px;
      background-color: #007aff;
      color: white;
    }

    .qr {
      margin-top: 30px;
    }

    footer {
      margin-top: 50px;
      font-size: 0.9em;
    }

    footer a {
      color: #555;
      text-decoration: none;
      margin: 0 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ZeitManager</h1>
    <p>iOS App die als Stempeluhr für den Arbeitsalltag dient und gleichzeitig auch</p>
    <p>einen Überblick über das ganze Kalenderjahr liefert. Inklusive einer</p>
    <p>Urlaubsplanung und der Anzeige von Schulferien.</p>

  <div class="buttons">
    <a href="#" target="_blank"> <!-- Später ersetzen durch: https://apps.apple.com/... -->
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" 
         alt="Download im App Store" height="50">
    </a>
  </div>

    <div class="qr">
      <p>QR-Code scannen:</p>
      <img src="qr-code.png" alt="QR Code zur App" width="150">
    </div>

    <footer>
      <a href="impressum.html">Impressum</a> |
      <a href="datenschutz.html">Datenschutz</a>
    </footer>
  </div>

</html>
