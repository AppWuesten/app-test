<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ZeitManager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f5f5f7;
  color: #1d1d1f;
  text-align: center;
}

/* Container */
.container {
  max-width: 800px;
  margin: 60px auto;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

.header img {
  width: 60px;
  border-radius: 14px;
}

h1 {
  font-size: 2.2em;
  <!--margin: 0;-->
}

@media (min-width: 768px) {
  h1 {
    font-size: 2.6em;
  }
}

/* Text */
.subtitle {
  margin: 20px auto;
  font-size: 1.2em;
  color: #555;
  max-width: 500px;
  line-height: 1.6;
}

/* Button */
.buttons a {
  display: inline-block;
  margin: 25px 0;
}

/* DEVICE SWITCH */
.device-switch {
  margin-top: 40px;
}

.device-switch button {
  border: none;
  background: none;
  font-size: 16px;
  margin: 0 10px;
  padding: 8px 12px;
  cursor: pointer;
  color: #007aff;
}

.device-switch button.active {
  font-weight: bold;
  border-bottom: 2px solid #007aff;
}

/* Screenshot Scroll */
.screenshot-container {
  margin-top: 25px;
  overflow-x: auto;
  display: flex;
  gap: 15px;
  padding: 10px;
  scroll-snap-type: x mandatory;
}

.screenshot-container img {
  height: 300px;
  border-radius: 20px;
  scroll-snap-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  background: white;
  padding: 5px;
}

/* QR */
.qr {
  margin-top: 40px;
}

/* Footer */
footer {
  margin-top: 60px;
  font-size: 0.9em;
}

footer a {
  color: #666;
  text-decoration: none;
  margin: 0 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="AppIcon-iOS-Default-1024x1024@2x.png">
    <h1>ZeitManager</h1>
  </div>

  <p class="subtitle">
    Behalte deine Arbeitszeit einfach im Blick.<br>
    Erfasse deine Stunden, plane deinen Urlaub und<br>
    überblicke dein gesamtes Jahr – alles in einer App.
  </p>

  <!-- BUTTON -->
  <div class="buttons">
    <a href="#">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" height="50">
    </a>
  </div>

  <!-- DEVICE SWITCH -->
  <div class="device-switch">
    <button class="active" onclick="showDevice('iphone')">iPhone</button>
    <button onclick="showDevice('ipad')">iPad</button>
    <button onclick="showDevice('watch')">Watch</button>
  </div>

  <!-- SCREENSHOTS -->
  <div id="iphone" class="screenshot-container">
    <img src="Simulator Screenshot - iPhone 17 Pro - 2026-04-06 at 19.06.47.png">
    <img src="Simulator Screenshot - iPhone 17 Pro - 2026-04-06 at 19.07.23.png">
    <img src="iphone3.png">
  </div>

  <div id="ipad" class="screenshot-container" style="display:none;">
    <img src="ipad1.png">
    <img src="ipad2.png">
  </div>

  <div id="watch" class="screenshot-container" style="display:none;">
    <img src="watch1.png">
  </div>

  <!-- QR -->
  <div class="qr">
    <p>QR-Code scannen:</p>
    <img src="qr-code.png" width="140">
  </div>

  <footer>
    <a href="impressum.html">Impressum</a> |
    <a href="datenschutz.html">Datenschutz</a>
  </footer>

</div>

<script>
function showDevice(device) {
  document.getElementById('iphone').style.display = 'none';
  document.getElementById('ipad').style.display = 'none';
  document.getElementById('watch').style.display = 'none';

  document.getElementById(device).style.display = 'flex';

  document.querySelectorAll('.device-switch button').forEach(btn => {
    btn.classList.remove('active');
  });

  event.target.classList.add('active');
}
</script>

</body>
</html>
